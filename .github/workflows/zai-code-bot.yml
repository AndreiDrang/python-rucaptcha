name: Z.ai Code Bot

concurrency:
  group: zai-bot-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
        branches:
            - main
            - prod
    issue_comment:
        types:
            - created
    pull_request_review_comment:
        types:
            - created

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    zai-bot:
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
          (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
          (github.event_name == 'pull_request_review_comment' && github.event.pull_request.draft == false)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Run Z.ai Bot
              uses: AndreiDrang/zai-code-bot@main
              with:
                  ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
                  ZAI_MODEL: ${{ vars.ZAI_MODEL || 'glm-5.1' }}
                  GITHUB_TOKEN: ${{ github.token }}
